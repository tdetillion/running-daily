name: Running Daily

on:
  schedule:
    # 9:00 AM CT = 14:00 UTC (CDT, Mar-Nov) / change to 15:00 in winter (CST)
    - cron: '0 14 * * 1,5'
  workflow_dispatch:

jobs:
  send-running-daily:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run Running Daily script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python send_running_daily.py

      - name: Commit and push HTML files
        run: |
          git config user.name "Running Daily Bot"
          git config user.email "actions@github.com"
          git add index.html style.css editions/
          git diff --staged --quiet || git commit -m "Running Daily — $(date +'%B %d, %Y')"
          git push
